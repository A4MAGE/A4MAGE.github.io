<!-- AudioControls.html - Yazeed & Gladys -->
<!-- Responsible for: play/pause UI controls, displays playback state -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Controls</title>
    <style>
        :root {
            font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
            color-scheme: dark;
            color: rgba(255, 255, 255, 0.87);
            background-color: #2b2b2b;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            place-items: center;
            justify-content: center;
        }

        #audio-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1rem;
            background-color: rgb(68, 68, 68);
            border-radius: 1.5rem;
            filter: drop-shadow(4px 4px 8px rgba(0, 0, 0, 0.5));
            min-width: 300px;
        }

        h2 {
            margin: 0;
        }

        input[type="file"] {
            color: rgba(255, 255, 255, 0.87);
            font-family: inherit;
        }

        .button-row {
            display: flex;
            gap: 0.5rem;
        }

        button {
            border-radius: 8px;
            border: 1px solid transparent;
            padding: 0.6em 1.2em;
            font-size: 1em;
            font-weight: 500;
            font-family: inherit;
            color: white;
            background-color: #2f66b5;
            cursor: pointer;
            transition: background-color 0.25s;
            flex: 1;
        }

        button:hover {
            background-color: #28518a;
        }

        button:disabled {
            background-color: #444;
            cursor: not-allowed;
        }

        #playback-status {
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

<div id="audio-controls">
    <h2>Audio Controls</h2>

    <input type="file" id="audio-file" accept="audio/*">

    <div class="button-row">
        <button id="play-btn" disabled>Play</button>
        <button id="pause-btn" disabled>Pause</button>
    </div>

    <div id="playback-status">No file loaded.</div>
</div>

<script src="../AudioEngine.js"></script>
<script>
    const engine = new AudioEngine();

    const fileInput = document.getElementById('audio-file');
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const statusDiv = document.getElementById('playback-status');

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        engine.setAudioSource(file, { title: file.name });
        playBtn.disabled = false;
        pauseBtn.disabled = false;
        statusDiv.textContent = 'Loaded: ' + file.name;
    });

    playBtn.addEventListener('click', () => {
        engine.play();
    });

    pauseBtn.addEventListener('click', () => {
        engine.pause();
    });

    setInterval(() => {
        const state = engine.getPlaybackState();
        if (!state.duration) return;
        const current = state.currentTime.toFixed(1);
        const total = state.duration.toFixed(1);
        const status = state.playing ? 'Playing' : 'Paused';
        statusDiv.textContent = status + ' — ' + current + 's / ' + total + 's';
    }, 1000);
</script>

</body>
</html>
